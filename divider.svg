<svg width="1200" height="24" viewBox="0 0 1200 24" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="divGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0F2027" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00C9FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0F2027" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="11" width="1200" height="2" fill="url(#divGrad)">
    <animate attributeName="x" values="-1200;0;1200" dur="4s" repeatCount="indefinite"/>
  </rect>
  <circle cx="600" cy="12" r="4" fill="#00C9FF">
    <animate attributeName="r" values="3;6;3" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
