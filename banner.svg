<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F2027">
        <animate attributeName="stop-color" values="#0F2027;#2C5364;#0F2027" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#2C5364">
        <animate attributeName="stop-color" values="#2C5364;#00C9FF;#2C5364" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#00C9FF">
        <animate attributeName="stop-color" values="#00C9FF;#0F2027;#00C9FF" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00C9FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00C9FF" stop-opacity="0"/>
    </radialGradient>

    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>

    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bgGrad)"/>

  <!-- Floating orbit rings -->
  <g opacity="0.35">
    <circle cx="1050" cy="70" r="55" fill="none" stroke="#00C9FF" stroke-width="1.5">
      <animateTransform attributeName="transform" type="rotate" from="0 1050 70" to="360 1050 70" dur="20s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1050" cy="70" r="3" fill="#00C9FF">
      <animateMotion dur="20s" repeatCount="indefinite" path="M 55 0 A 55 55 0 1 1 -55 0 A 55 55 0 1 1 55 0"/>
    </circle>
  </g>

  <g opacity="0.3">
    <circle cx="140" cy="230" r="40" fill="none" stroke="#FFFFFF" stroke-width="1">
      <animateTransform attributeName="transform" type="rotate" from="360 140 230" to="0 140 230" dur="14s" repeatCount="indefinite"/>
    </circle>
    <circle cx="140" cy="230" r="2.5" fill="#FFFFFF">
      <animateMotion dur="14s" repeatCount="indefinite" path="M 40 0 A 40 40 0 1 1 -40 0 A 40 40 0 1 1 40 0"/>
    </circle>
  </g>

  <!-- Floating particles -->
  <g fill="#ffffff">
    <circle cx="80" cy="60" r="2.2" opacity="0.7">
      <animate attributeName="cy" values="60;40;60" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="220" cy="45" r="1.6" opacity="0.6">
      <animate attributeName="cy" values="45;65;45" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.15;0.6" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="30" r="2" opacity="0.5">
      <animate attributeName="cy" values="30;55;30" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="55" r="1.8" opacity="0.55">
      <animate attributeName="cy" values="55;30;55" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="35" r="2.4" opacity="0.6">
      <animate attributeName="cy" values="35;60;35" dur="6.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="50" r="1.7" opacity="0.5">
      <animate attributeName="cy" values="50;25;50" dur="7.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="920" cy="200" r="2" opacity="0.5">
      <animate attributeName="cy" values="200;225;200" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1000" cy="240" r="1.8" opacity="0.45">
      <animate attributeName="cy" values="240;215;240" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="180" r="2.1" opacity="0.5">
      <animate attributeName="cy" values="180;205;180" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1150" cy="150" r="2.3" opacity="0.55">
      <animate attributeName="cy" values="150;175;150" dur="6.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Rotating hex / code-brackets accent (subtle "engineering" motif) -->
  <g transform="translate(1000,190)" opacity="0.5">
    <text x="0" y="0" font-family="Fira Code, monospace" font-size="46" fill="#ffffff" opacity="0.25">{ }</text>
    <animateTransform attributeName="transform" type="translate" values="1000,190; 1000,205; 1000,190" dur="5s" repeatCount="indefinite" additive="sum"/>
  </g>

  <!-- Center glow pulse behind name -->
  <circle cx="600" cy="130" r="180" fill="url(#glow)" opacity="0.25">
    <animate attributeName="r" values="170;190;170" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- Name -->
  <text x="600" y="140" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="56" font-weight="700"
        fill="#ffffff" text-anchor="middle" filter="url(#textGlow)">
    Jam Muhammad Yousuf
    <animate attributeName="opacity" values="0;1" dur="1.4s" fill="freeze"/>
  </text>

  <!-- Tagline -->
  <text x="600" y="185" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="21"
        fill="#B9F3FF" text-anchor="middle" opacity="0.95">
    Full-Stack Software Engineer &#183; Backend-Leaning &#183; Node.js / NestJS / React
    <animate attributeName="opacity" values="0;0.95" dur="1.8s" fill="freeze" begin="0.4s"/>
  </text>

  <!-- Thin animated underline accent -->
  <rect x="450" y="205" width="300" height="2.5" fill="#00C9FF" opacity="0.8">
    <animate attributeName="width" values="0;300;0" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="x" values="600;450;600" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Bottom wave -->
  <path fill="#ffffff" opacity="0.08">
    <animate attributeName="d" dur="10s" repeatCount="indefinite"
      values="
      M0,280 C150,260 350,300 600,280 C850,260 1050,300 1200,280 L1200,300 L0,300 Z;
      M0,290 C150,300 350,260 600,290 C850,300 1050,260 1200,290 L1200,300 L0,300 Z;
      M0,280 C150,260 350,300 600,280 C850,260 1050,300 1200,280 L1200,300 L0,300 Z
      "/>
  </path>
</svg>
